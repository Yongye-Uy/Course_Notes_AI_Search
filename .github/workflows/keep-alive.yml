name: Keep Streamlit app awake

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        run: |
          echo "Pinging Streamlit..."

          - name: Debug Redirect
            run: |
              curl -v https://ye-coursenotesaisearch.streamlit.app/

          
