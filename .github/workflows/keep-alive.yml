name: Keep Streamlit app awake

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Streamlit
        run: |
          echo "========== $(date) =========="
          curl -v \
            --retry 3 \
            --retry-delay 5 \
            -A "Mozilla/5.0" \
            "https://ye-coursenotesaisearch.streamlit.app/"
